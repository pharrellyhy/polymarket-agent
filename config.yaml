# Auto-tuned on 2026-02-27
mode: paper
starting_balance: 100.0
poll_interval: 10
strategies:
  signal_trader:
    enabled: true
    volume_threshold: 1000
    price_move_threshold: 0.015
    min_price: 0.05
    order_size: 10.0
  market_maker:
    enabled: false
    spread: 0.05
    min_liquidity: 1000
    order_size: 50
  arbitrageur:
    enabled: true
    price_sum_tolerance: 0.015
    order_size: 10.0
    # Layer 1: Dependency detection
    dependency_detection: true
    dependency_provider: openai
    dependency_model: openai/gpt-oss-120b
    dependency_base_url: http://localhost:11567/v1
    dependency_max_calls_per_hour: 50
    dependency_cache_ttl: 3600
    # Layer 2: Bregman divergence
    min_bregman_divergence: 0.01
    # Layer 3: Frank-Wolfe optimizer
    fw_max_iterations: 150
    fw_convergence_threshold: 0.000001
    fw_alpha: 0.9
    fw_initial_epsilon: 0.1
    # Layer 5: Execution validation
    min_profit_threshold: 0.05
    max_slippage_pct: 0.02
  ai_analyst:
    enabled: true
    model: openai/gpt-oss-120b
    # model: qwen/qwen3.5-9b
    max_calls_per_hour: 5000
    min_divergence: 0.05
    min_price: 0.05
    order_size: 10.0
    max_tokens: 2048
    provider: openai
    structured_prompt: true
    extra_params:
      reasoning_budget: 0    # cap reasoning tokens
      enable_thinking: false  # or disable entirely
    # base_url: https://api.shubiaobiao.cn/v1
    # api_key_env: OPENAI_API_KEY
    base_url: http://localhost:11567/v1
    volatility_enabled: true
    sentiment_enabled: true
    keyword_spike_enabled: true
  technical_analyst:
    enabled: true
    ema_fast_period: 8
    ema_slow_period: 21
    rsi_period: 14
    history_interval: "1w"
    history_fidelity: 60
    order_size: 25.0
  whale_follower:
    enabled: true
    top_n: 10
    min_trade_size: 500.0
    order_size: 10.0
    leaderboard_period: month
    gamma_cache_ttl: 120.0
  date_curve_trader:
    enabled: true
    min_divergence: 0.10
    order_size: 25.0
    min_price: 0.03
    max_calls_per_hour: 10
    cache_ttl_seconds: 3600
    arb_confidence: 0.9
    provider: openai
    model: openai/gpt-oss-120b
    base_url: http://localhost:11567/v1
    max_tokens: 2048
    extra_params:
      reasoning_budget: 0
      enable_thinking: false
  sports_derivative_trader:
    enabled: true
    min_volume_24h: 200
    min_price: 0.03
    min_divergence: 0.08
    order_size: 15.0
    max_calls_per_hour: 15
    cache_ttl_seconds: 1800
    bracket_sum_tolerance: 0.05
    cascade_min_move: 0.15
    cascade_confidence: 0.75
    hierarchy_confidence: 0.85
    provider: openai
    model: openai/gpt-oss-120b
    base_url: http://localhost:11567/v1
    max_tokens: 2048
    extra_params:
      reasoning_budget: 0
      enable_thinking: false
  cross_platform_arb:
    enabled: false
    min_divergence: 0.05
    similarity_threshold: 0.55
    order_size: 25.0
    polymarket_fee: 0.02
    external_fee: 0.03
    kalshi_cache_ttl: 300.0
    metaculus_cache_ttl: 600.0
    kalshi_api_key_env: KALSHI_API_KEY
    metaculus_api_key_env: METACULUS_API_KEY
aggregation:
  min_confidence: 0.40
  min_strategies: 1
  performance_weighted: true
  conflict_resolution: false
risk:
  max_position_size: 200.0
  max_daily_loss: 500.0
  max_open_orders: 30
  reentry_cooldown_hours: 2
conditional_orders:
  enabled: true
  default_stop_loss_pct: 0.15
  default_take_profit_pct: 0.25
  trailing_stop_enabled: false
  trailing_stop_pct: 0.05
position_sizing:
  method: fractional_kelly
  kelly_fraction: 0.25
  max_bet_pct: 0.1
backtest:
  default_spread: 0.02
  snapshot_interval: 86400
exit_manager:
  enabled: true
  profit_target_pct: 0.15
  stop_loss_pct: 0.15
  signal_reversal: true
  max_hold_hours: 24
news:
  enabled: true
  provider: google_rss
  api_key_env: TAVILY_API_KEY
  max_calls_per_hour: 100
  cache_ttl: 600
  max_results: 5
focus:
  enabled: true
  search_queries: []
  max_brackets: 50
  fetch_limit: 200
  min_volume_24h: 300
  prioritize_trending: true
  categories:
    preferred: [politics, crypto, finance, tech, sports]
    excluded: []
monitoring:
  structured_logging: false
  log_file: logs/agent.log
  alert_webhooks: []
  snapshot_interval: 300
  dashboard_host: 0.0.0.0
  dashboard_port: 11648
